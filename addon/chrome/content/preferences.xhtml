<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
  <html:link
    rel="stylesheet"
    href="chrome://__addonRef__/content/styles/preferences.css"
  />
</linkset>
<vbox
  id="zotero-prefpane-__addonRef__"
  onload="Zotero.__addonInstance__?.hooks?.onPrefsLoad?.(event)"
>
  <groupbox>
    <label><html:h2 data-l10n-id="pref-vault-title"></html:h2></label>
    <description data-l10n-id="pref-vault-description"></description>
    <hbox align="center">
      <label data-l10n-id="pref-vault-path"></label>
      <html:input
        id="__addonRef__-vaultPath"
        type="text"
        placeholder="~/papers"
      ></html:input>
      <button
        id="__addonRef__-vaultBrowse"
        data-l10n-id="pref-vault-browse"
      ></button>
      <button
        id="__addonRef__-vaultDefault"
        data-l10n-id="pref-vault-useDefault"
      ></button>
    </hbox>
    <html:div
      id="__addonRef__-vaultStatus"
      class="zoteroagent-pref-status"
    ></html:div>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="pref-codex-title"></html:h2></label>
    <description data-l10n-id="pref-codex-description"></description>
    <hbox align="center">
      <label data-l10n-id="pref-codex-path"></label>
      <html:input
        id="__addonRef__-codexPath"
        type="text"
        placeholder="/opt/homebrew/bin/codex"
      ></html:input>
      <button
        id="__addonRef__-codexBrowse"
        data-l10n-id="pref-codex-browse"
      ></button>
    </hbox>
    <hbox align="center">
      <button
        id="__addonRef__-codexDetect"
        data-l10n-id="pref-codex-detect"
      ></button>
      <button
        id="__addonRef__-codexTest"
        data-l10n-id="pref-codex-test"
      ></button>
    </hbox>
    <html:div
      id="__addonRef__-codexStatus"
      class="zoteroagent-pref-status"
    ></html:div>
    <html:details class="zoteroagent-pref-advanced">
      <html:summary
        class="zoteroagent-pref-advanced-summary"
        data-l10n-id="pref-codex-advanced"
      ></html:summary>
      <hbox align="center">
        <label data-l10n-id="pref-codex-model"></label>
        <html:input
          id="__addonRef__-codexModelSlug"
          type="text"
          placeholder="gpt-5.5"
        ></html:input>
        <label data-l10n-id="pref-codex-contextWindow"></label>
        <html:input
          id="__addonRef__-codexContextWindow"
          type="number"
          min="1"
          step="1"
          placeholder="128000"
        ></html:input>
      </hbox>
      <hbox align="center">
        <label data-l10n-id="pref-codex-cheapModel"></label>
        <html:input
          id="__addonRef__-codexCheapModelSlug"
          type="text"
          placeholder="gpt-5.5"
        ></html:input>
        <label data-l10n-id="pref-codex-coldStartEffort"></label>
        <html:select id="__addonRef__-codexColdStartEffort">
          <html:option
            value=""
            data-l10n-id="pref-codex-coldStartEffort-default"
          ></html:option>
          <html:option value="minimal">minimal</html:option>
          <html:option value="low">low</html:option>
          <html:option value="medium">medium</html:option>
          <html:option value="high">high</html:option>
          <html:option value="xhigh">xhigh</html:option>
        </html:select>
      </hbox>
    </html:details>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="pref-services-title"></html:h2></label>
    <description data-l10n-id="pref-services-description"></description>
    <html:div id="__addonRef__-services-list"></html:div>
    <hbox align="center">
      <button id="__addonRef__-svcAdd" data-l10n-id="pref-svc-add"></button>
      <button
        id="__addonRef__-svcRemove"
        data-l10n-id="pref-svc-remove"
      ></button>
      <button
        id="__addonRef__-svcDefault"
        data-l10n-id="pref-svc-setDefault"
      ></button>
    </hbox>
    <html:div
      id="__addonRef__-svcRemoveConfirm"
      class="zoteroagent-pref-confirm"
      style="display: none"
    >
      <html:span data-l10n-id="pref-svc-removeConfirm-text"></html:span>
      <button
        id="__addonRef__-svcRemoveConfirmCancel"
        data-l10n-id="pref-svc-removeConfirm-cancel"
      ></button>
      <button
        id="__addonRef__-svcRemoveConfirmAction"
        data-l10n-id="pref-svc-removeConfirm-action"
      ></button>
    </html:div>
    <vbox id="__addonRef__-svcEditor">
      <hbox align="center">
        <label data-l10n-id="pref-svc-provider"></label>
        <html:select id="__addonRef__-svcProvider"></html:select>
      </hbox>
      <hbox align="center">
        <label data-l10n-id="pref-svc-name"></label>
        <html:input id="__addonRef__-svcName" type="text"></html:input>
        <label data-l10n-id="pref-svc-apiFormat"></label>
        <html:select id="__addonRef__-svcApiFormat">
          <html:option
            value="chat-completions"
            data-l10n-id="pref-svc-apiFormat-chatCompletions"
          ></html:option>
          <html:option
            value="responses"
            data-l10n-id="pref-svc-apiFormat-responses"
          ></html:option>
          <html:option
            value="anthropic"
            data-l10n-id="pref-svc-apiFormat-messages"
          ></html:option>
        </html:select>
      </hbox>
      <hbox align="center">
        <label data-l10n-id="pref-svc-apiUrl"></label>
        <html:input id="__addonRef__-svcApiUrl" type="text"></html:input>
      </hbox>
      <hbox align="center">
        <label data-l10n-id="pref-svc-apiKey"></label>
        <html:input id="__addonRef__-svcApiKey" type="password"></html:input>
        <button
          id="__addonRef__-svcApiKeyToggle"
          data-l10n-id="pref-svc-apiKey-show"
        ></button>
      </hbox>
      <hbox align="center">
        <label data-l10n-id="pref-svc-model"></label>
        <html:input id="__addonRef__-svcModel" type="text"></html:input>
        <label data-l10n-id="pref-svc-miniModel"></label>
        <html:input
          id="__addonRef__-svcMiniModel"
          type="text"
          placeholder="auto"
        ></html:input>
      </hbox>
      <hbox align="center">
        <button id="__addonRef__-svcTest" data-l10n-id="pref-svc-test"></button>
      </hbox>
      <html:div
        id="__addonRef__-svcStatus"
        class="zoteroagent-pref-status"
      ></html:div>
    </vbox>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="pref-about-title"></html:h2></label>
    <label
      data-l10n-id="pref-about-version"
      data-l10n-args='{"name": "__addonName__", "version": "__buildVersion__", "time": "__buildTime__"}'
    ></label>
  </groupbox>
</vbox>
