<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<vbox
  id="zotero-prefpane-__addonRef__"
  onload="Zotero.__addonInstance__?.hooks?.onPrefsLoad?.(event)"
>
  <groupbox>
    <label><html:h2 data-l10n-id="pref-codex-title"></html:h2></label>
    <description data-l10n-id="pref-codex-description"></description>
    <hbox align="center">
      <label data-l10n-id="pref-codex-path" style="min-width: 80px"></label>
      <html:input
        id="__addonRef__-codexPath"
        type="text"
        style="min-width: 480px"
        placeholder="/opt/homebrew/bin/codex"
      ></html:input>
    </hbox>
    <hbox align="center">
      <label data-l10n-id="pref-codex-model" style="min-width: 80px"></label>
      <html:input
        id="__addonRef__-codexModelSlug"
        type="text"
        style="min-width: 240px"
        placeholder="gpt-5.5"
      ></html:input>
      <label
        data-l10n-id="pref-codex-contextWindow"
        style="min-width: 120px; margin-left: 12px"
      ></label>
      <html:input
        id="__addonRef__-codexContextWindow"
        type="number"
        min="1"
        step="1"
        style="min-width: 160px"
        placeholder="128000"
      ></html:input>
    </hbox>
    <hbox align="center">
      <label data-l10n-id="pref-codex-cheapModel" style="min-width: 80px"></label>
      <html:input
        id="__addonRef__-codexCheapModelSlug"
        type="text"
        style="min-width: 240px"
        placeholder="gpt-5.5"
      ></html:input>
    </hbox>
    <hbox align="center">
      <button
        id="__addonRef__-codexSave"
        data-l10n-id="pref-codex-save"
      ></button>
      <button
        id="__addonRef__-codexTest"
        data-l10n-id="pref-codex-test"
      ></button>
    </hbox>
    <html:div
      id="__addonRef__-codexStatus"
      style="font-size: 12px; color: #666; margin-top: 6px; white-space: pre-wrap"
    ></html:div>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="pref-vault-title"></html:h2></label>
    <description data-l10n-id="pref-vault-description"></description>
    <hbox align="center">
      <label data-l10n-id="pref-vault-path" style="min-width: 80px"></label>
      <html:input
        id="__addonRef__-vaultPath"
        type="text"
        style="min-width: 480px"
        placeholder="~/papers"
      ></html:input>
    </hbox>
    <hbox align="center">
      <button
        id="__addonRef__-vaultSave"
        data-l10n-id="pref-vault-save"
      ></button>
      <button
        id="__addonRef__-vaultDefault"
        data-l10n-id="pref-vault-useDefault"
      ></button>
    </hbox>
    <html:div
      id="__addonRef__-vaultStatus"
      style="font-size: 12px; color: #666; margin-top: 6px; white-space: pre-wrap"
    ></html:div>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="pref-services-title"></html:h2></label>
    <html:div
      id="__addonRef__-services-list"
      style="
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 8px;
        max-height: 160px;
        overflow-y: auto;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 4px;
      "
    ></html:div>
    <hbox align="center">
      <button id="__addonRef__-svcAdd" data-l10n-id="pref-svc-add"></button>
      <button
        id="__addonRef__-svcRemove"
        data-l10n-id="pref-svc-remove"
      ></button>
      <button
        id="__addonRef__-svcDefault"
        data-l10n-id="pref-svc-setDefault"
      ></button>
    </hbox>
    <vbox id="__addonRef__-svcEditor" style="margin-top: 8px">
      <hbox align="center">
        <label data-l10n-id="pref-svc-provider" style="min-width: 80px"></label>
        <html:select
          id="__addonRef__-svcProvider"
          style="min-width: 200px"
        ></html:select>
      </hbox>
      <hbox align="center">
        <label data-l10n-id="pref-svc-name" style="min-width: 80px"></label>
        <html:input
          id="__addonRef__-svcName"
          type="text"
          style="min-width: 200px"
        ></html:input>
        <label
          data-l10n-id="pref-svc-apiFormat"
          style="min-width: 80px; margin-left: 12px"
        ></label>
        <html:select id="__addonRef__-svcApiFormat" style="min-width: 140px">
          <html:option
            value="chat-completions"
            data-l10n-id="pref-svc-apiFormat-chatCompletions"
          ></html:option>
          <html:option
            value="responses"
            data-l10n-id="pref-svc-apiFormat-responses"
          ></html:option>
          <html:option
            value="anthropic"
            data-l10n-id="pref-svc-apiFormat-messages"
          ></html:option>
        </html:select>
      </hbox>
      <hbox align="center">
        <label data-l10n-id="pref-svc-apiUrl" style="min-width: 80px"></label>
        <html:input
          id="__addonRef__-svcApiUrl"
          type="text"
          style="min-width: 480px"
        ></html:input>
      </hbox>
      <hbox align="center">
        <label data-l10n-id="pref-svc-apiKey" style="min-width: 80px"></label>
        <html:input
          id="__addonRef__-svcApiKey"
          type="password"
          style="min-width: 320px"
        ></html:input>
      </hbox>
      <hbox align="center">
        <label data-l10n-id="pref-svc-model" style="min-width: 80px"></label>
        <html:input
          id="__addonRef__-svcModel"
          type="text"
          style="min-width: 200px"
        ></html:input>
        <label
          data-l10n-id="pref-svc-miniModel"
          style="min-width: 80px; margin-left: 12px"
        ></label>
        <html:input
          id="__addonRef__-svcMiniModel"
          type="text"
          style="min-width: 160px"
          placeholder="auto"
        ></html:input>
      </hbox>
      <hbox align="center">
        <button id="__addonRef__-svcSave" data-l10n-id="pref-svc-save"></button>
        <button id="__addonRef__-svcTest" data-l10n-id="pref-svc-test"></button>
      </hbox>
    </vbox>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="pref-about-title"></html:h2></label>
    <label
      data-l10n-id="pref-about-version"
      data-l10n-args='{"name": "__addonName__", "version": "__buildVersion__", "time": "__buildTime__"}'
    ></label>
  </groupbox>
</vbox>
